server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # React SPA — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass https://birthday-site-production-27a4.up.railway.app/;
        proxy_set_header Host birthday-site-production-27a4.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    # Proxy WebSocket
    location /ws/ {
        proxy_pass https://birthday-site-production-27a4.up.railway.app/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host birthday-site-production-27a4.up.railway.app;
        proxy_read_timeout 86400s;
    }
}